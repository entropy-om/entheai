name: Bug report
description: Report a reproducible bug
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide enough detail to reproduce.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, and inputs.
      placeholder: |
        1. Run ...
        2. Execute ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and output
      description: Paste relevant output from terminal or logs.
      render: shell
  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: rustc --version
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 14.5
  - type: dropdown
    id: provider
    attributes:
      label: Provider in use
      options:
        - osaurus
        - zen
        - other
