[package]
name = "entheai"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

[dependencies]
entheai-config = { path = "../../crates/config" }
entheai-providers = { path = "../../crates/providers" }
entheai-core = { path = "../../crates/core" }
entheai-tools = { path = "../../crates/tools" }
entheai-permission = { path = "../../crates/permission" }
entheai-tui = { path = "../../crates/tui" }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "io-std", "io-util"] }
anyhow.workspace = true
clap.workspace = true
sentry = { workspace = true }
dotenvy = { workspace = true }

# macOS: mimalloc as the global allocator (wired in main.rs) — better under concurrent load.
[target.'cfg(target_os = "macos")'.dependencies]
mimalloc = { workspace = true }
