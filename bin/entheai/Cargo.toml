[package]
name = "entheai"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
description.workspace = true
homepage.workspace = true

[dependencies]
entheai-config = { path = "../../crates/config" }
entheai-core = { path = "../../crates/core" }
adk-rust = { workspace = true }
entheai-router = { path = "../../crates/router" }
entheai-orchestrator = { path = "../../crates/orchestrator" }
entheai-tools = { path = "../../crates/tools" }
entheai-permission = { path = "../../crates/permission" }
entheai-tui = { path = "../../crates/tui", default-features = false }
# companion for the `state` protocol only; the window runs as a separate child
# process (spawned by path), so the bin never links winit. `default-features =
# false` keeps the GUI stack out of the core binary's dependency graph.
entheai-companion = { path = "../../crates/companion", default-features = false }
entheai-mcp = { path = "../../crates/mcp" }
entheai-skills = { path = "../../crates/skills" }
entheai-memory = { path = "../../crates/memory" }
entheai-memory-pp = { path = "../../crates/memory-pp" }
entheai-launcher = { path = "../../crates/launcher" }
entheai-obsidian = { path = "../../crates/obsidian" }
entheai-federation = { path = "../../crates/federation" }
entheai-bus = { path = "../../crates/bus" }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "io-std", "io-util", "net"] }
anyhow.workspace = true
clap.workspace = true
serde_json.workspace = true
async-trait.workspace = true
uuid = { version = "1", features = ["v4"] }
sentry = { workspace = true }
dotenvy = { workspace = true }
log = { version = "0.4", features = ["std"] }

[features]
# `desktop` (default) enables the in-TUI audio radio (via the TUI's own feature).
# Build with `--no-default-features` for a fully headless/portable binary that
# links no GUI or audio system libraries (openssl is already gone via rustls).
default = ["desktop"]
desktop = ["entheai-tui/desktop"]

# macOS: mimalloc as the global allocator (wired in main.rs) — better under concurrent load.
[target.'cfg(target_os = "macos")'.dependencies]
mimalloc = { workspace = true }
