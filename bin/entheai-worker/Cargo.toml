[package]
name = "entheai-worker"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
description.workspace = true
homepage.workspace = true

[dependencies]
entheai-config = { path = "../../crates/config" }
entheai-orchestrator = { path = "../../crates/orchestrator" }
entheai-federation = { path = "../../crates/federation" }
entheai-sandbox = { path = "../../crates/sandbox" }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "process", "io-util", "fs", "time"] }
anyhow.workspace = true
clap.workspace = true
serde_json.workspace = true
tempfile = "3"
log = "0.4"
futures = { workspace = true }
env_logger = "0.11"
libc = "0.2" # geteuid() for the privilege-drop target (worker_drop_uid)
