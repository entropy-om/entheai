<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" font-family="monospace">
  <defs>
    <radialGradient id="bg" cx="26%" cy="8%" r="120%">
      <stop offset="0%" stop-color="#12131f"/><stop offset="55%" stop-color="#0b0d16"/><stop offset="100%" stop-color="#07080f"/>
    </radialGradient>
    <marker id="cy" markerWidth="10" markerHeight="10" refX="7.5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#3fe0ef"/></marker>
    <marker id="am" markerWidth="10" markerHeight="10" refX="7.5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#e8b06a"/></marker>
  </defs>
  <rect width="1600" height="600" fill="url(#bg)"/>

  <!-- brand mark -->
  <g transform="translate(1512,58)"><circle r="6" fill="#ffe9c2"/>
    <g stroke="#3fe0ef" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M0,-34 A34,34 0 0 1 24,-24"/><path d="M34,0 A34,34 0 0 1 24,24"/><path d="M0,34 A34,34 0 0 1 -24,24"/><path d="M-34,0 A34,34 0 0 1 -24,-24"/></g></g>

  <text x="60" y="66" fill="#e8b06a" font-size="40" font-weight="700">entheai</text>
  <text x="272" y="64" fill="#8fa3b0" font-size="19">· recursive development</text>
  <text x="62" y="98" fill="#8fa3b0" font-size="16">entheai builds entheai — orchestrate &#9656; fan out to agy coders &#9656; integrate, bounded by a depth guard</text>

  <!-- you -->
  <text x="60" y="316" fill="#8fa3b0" font-size="20" font-weight="700">you</text>
  <text x="60" y="338" fill="#6b7d8a" font-size="13">a task</text>
  <line x1="112" y1="310" x2="176" y2="310" stroke="#3fe0ef" stroke-width="2" marker-end="url(#cy)"/>

  <!-- L0 -->
  <rect x="188" y="150" width="360" height="330" rx="16" fill="#101a26" stroke="#22506a" stroke-width="1.4"/>
  <text x="212" y="184" fill="#cfe4ee" font-size="20" font-weight="700">entheai &#183; layer 0</text>
  <text x="212" y="205" fill="#6b7d8a" font-size="13">orchestrate &#183; decompose &#183; fan out</text>
  <g font-size="14">
    <rect x="212" y="224" width="312" height="44" rx="8" fill="#0c1e28" stroke="#1e6a7d"/><text x="228" y="251" fill="#cde3ee">explore</text><text x="356" y="251" fill="#3fe0ef" font-size="11">&#8594; agy &#183; gemini-3.6-flash</text>
    <rect x="212" y="276" width="312" height="44" rx="8" fill="#0c1e28" stroke="#1e6a7d"/><text x="228" y="303" fill="#cde3ee">code</text><text x="356" y="303" fill="#3fe0ef" font-size="11">&#8594; agy &#183; gemini-3.6-flash</text>
    <rect x="212" y="328" width="312" height="44" rx="8" fill="#0c1e28" stroke="#1e6a7d"/><text x="228" y="355" fill="#cde3ee">review</text><text x="356" y="355" fill="#3fe0ef" font-size="11">&#8594; agy &#183; gemini-3.6-flash</text>
    <rect x="212" y="380" width="312" height="44" rx="8" fill="#0c1e28" stroke="#1e6a7d"/><text x="228" y="407" fill="#cde3ee">test</text><text x="356" y="407" fill="#3fe0ef" font-size="11">&#8594; agy &#183; gemini-3.6-flash</text>
  </g>
  <text x="212" y="452" fill="#6b7d8a" font-size="12.5">each coder = isolated git worktree &#183; uncommitted edits</text>

  <!-- recurse to L1 -->
  <path d="M524,298 C562,298 562,300 596,300" stroke="#e8b06a" stroke-width="2.2" fill="none" marker-end="url(#am)"/>
  <text x="530" y="288" fill="#7a5f36" font-size="12">recurse &#8635;</text>

  <!-- L1 -->
  <rect x="604" y="196" width="300" height="238" rx="16" fill="#101a26" stroke="#22506a" stroke-width="1.4"/>
  <text x="626" y="228" fill="#cfe4ee" font-size="18" font-weight="700">entheai &#183; layer 1</text>
  <text x="626" y="248" fill="#6b7d8a" font-size="13">a coder that fans out again</text>
  <rect x="626" y="264" width="256" height="40" rx="8" fill="#0c1e28" stroke="#1e6a7d"/><text x="642" y="289" fill="#cde3ee" font-size="13">code</text><text x="800" y="289" fill="#3fe0ef" font-size="11">&#8594; agy</text>
  <rect x="626" y="312" width="256" height="40" rx="8" fill="#0c1e28" stroke="#1e6a7d"/><text x="642" y="337" fill="#cde3ee" font-size="13">test</text><text x="800" y="337" fill="#3fe0ef" font-size="11">&#8594; agy</text>
  <text x="626" y="386" fill="#6b7d8a" font-size="12.5">depth env +1 &#183; layer-aware prompt</text>
  <path d="M882,322 C914,322 914,322 944,322" stroke="#e8b06a" stroke-width="2" fill="none" marker-end="url(#am)"/>

  <!-- L2 -->
  <rect x="952" y="238" width="230" height="150" rx="14" fill="#101a26" stroke="#22506a" stroke-width="1.4"/>
  <text x="972" y="270" fill="#cfe4ee" font-size="16" font-weight="700">entheai &#183; layer 2</text>
  <text x="972" y="290" fill="#6b7d8a" font-size="13">deeper still&#8230;</text>
  <rect x="972" y="304" width="188" height="36" rx="8" fill="#0c1e28" stroke="#1e6a7d"/><text x="988" y="327" fill="#cde3ee" font-size="12">code &#8594; agy</text>
  <path d="M1160,322 C1186,322 1186,322 1210,322" stroke="#e08a6a" stroke-width="2" fill="none" marker-end="url(#am)"/>

  <!-- L3 cap -->
  <rect x="1218" y="272" width="200" height="96" rx="14" fill="#1a1114" stroke="#7a3a2a" stroke-width="1.4"/>
  <text x="1240" y="306" fill="#e08a6a" font-size="15" font-weight="700">&#8856; layer 3 &#183; cap</text>
  <text x="1240" y="330" fill="#a06a58" font-size="13">MAX_DEPTH reached</text>
  <text x="1240" y="350" fill="#a06a58" font-size="13">&#8594; run coder locally</text>

  <text x="604" y="470" fill="#7a5f36" font-size="12">recursion guard &#183; ENTHEAI_FANOUT_DEPTH &#8804; 3 &#183; a coder can never spawn an unbounded fan-out</text>

  <!-- integrate return -->
  <path d="M368,478 C368,545 900,560 1300,505" stroke="#3fe0ef" stroke-width="2" fill="none" opacity="0.55" marker-end="url(#cy)" stroke-dasharray="1 6"/>
  <text x="690" y="556" fill="#5f7484" font-size="12">&#8617; integrate &#183; verify (build &amp; test) &#183; squash-merge each worktree back onto the branch</text>

  <text x="60" y="586" fill="#5f7484" font-size="15">one orchestrator &#183; a swarm of model-matched coders on your Ultra models &#183; recursion that knows exactly which layer it&#8217;s in</text>
</svg>
