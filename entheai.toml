# Keys are loaded from .env at startup (DEEPSEEK_API_KEY / HUGGINGFACE_API_KEY /
# OPENROUTER_API_KEY / OPENCODE_API_KEY). See .env.example. Switch providers with
# `--model "<provider>/<model>"` or by changing default_model below.
#
# Add a skill from the web (tries <origin>/.well-known/skills.json, then /llms.txt,
# then the page), then exit — writes skills/<slug>/SKILL.md, live on the next run:
#   entheai --skills add https://docs.stripe.com
default_model = "deepseek/deepseek-chat"

# DeepSeek direct API. Models: deepseek-chat (V3), deepseek-reasoner (R1).
[providers.deepseek]
base_url = "https://api.deepseek.com/v1"
api_key_env = "DEEPSEEK_API_KEY"

# OpenRouter aggregator — e.g. --model "openrouter/deepseek/deepseek-chat"
[providers.openrouter]
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"

# Hugging Face Inference router (OpenAI-compatible); model ids are HF repo paths.
# e.g. --model "hf/deepseek-ai/DeepSeek-V3-0324"
[providers.hf]
base_url = "https://router.huggingface.co/v1"
api_key_env = "HUGGINGFACE_API_KEY"

# OpenCode Zen (needs OPENCODE_API_KEY + credits) — e.g. --model "zen/deepseek-v4-pro"
[providers.zen]
base_url = "https://opencode.ai/zen/v1"
api_key_env = "OPENCODE_API_KEY"

# Local (private) via Osaurus — e.g. --model "osaurus/gemma-4-e2b-it-4bit"
# See docs/osaurus-setup.md and docs/osaurus-opencode-provider.md.
[providers.osaurus]
base_url = "http://127.0.0.1:1337/v1"

# ── Fan-out routing (used by `entheai --fanout "<task>"`) ─────────────────────
# The orchestrator decomposes the task into role-tagged sub-tasks, runs them in
# parallel (coders in isolated git worktrees), and synthesizes/integrates the
# result. Each role routes to the first model listed for it (falling back to
# `orchestrator`, then `default_model`, when a role is unset). Tier freely across
# the providers above — cheap/local models for exploration, stronger for review.
[router]
orchestrator = "deepseek/deepseek-chat" # DeepSeek V4 Pro via credits: "zen/deepseek-v4-pro"
max_parallel = 4                         # cap on concurrently-running sub-agents
# max_turns = 200                        # per-task tool-dispatch round cap (default 200; UNLIMITED under --yolo)

# Optional: verify each coder's worktree before integrating its changes.
# [fanout]
# verify = "cargo test"

# ── TUI visualization ─────────────────────────────────────────────────────────
# [viz]
# swarm = true          # inline swarm graph during --fanout (Ctrl-V / /viz full view)
# brain = true          # always-on side panel: a rotating faculties+fleet graph with
#                       # `wk N · nats ●/○ · ctx %`. Toggle live with /brain.
# brain_width = 26      # panel width in columns (auto-hides on narrow terminals)

# ── Prompt-processing retrieval (opt-in, Slice 1) ─────────────────────────────
# Keep the past RAW; search it; compress LAST. Off by default (mode = "topk" =
# today's top-K). Slice 1 ingests raw experience + always falls back to top-K
# (the mesh + marqant are stubbed); Slice 2 drops in the ultra-graph sidecar + mq.
# [memory]
# mode = "prompt-processing"        # default: "topk" (today's behaviour)
# [memory.prompt_processing]
#   search_deadline_ms = 1500       # fail fast to top-K past this deadline
#   raw_retention_days = 90         # raw experiential store retention (pruned at startup)
#   recall_k           = 64         # Stage-1 lexical recall breadth
#   raw_path           = "~/.cache/entheai/raw.db"
#   # Slice 2 (not yet active): sidecar_cmd, mesh_size, marqant_cmd

# ── Federation event bus (entheai-bus, F1) ───────────────────────────────────
# Opt-in + fail-safe: with enabled = false (default) or an unreachable hub,
# entheai runs entirely locally — federation never blocks a run. When enabled,
# every `--fanout` run publishes its lifecycle to NATS on the subjects
# `entheai.fanout.<session>.{decomposed,coder.started,coder.finished,integrating,done}`
# so any tailnet subscriber can watch runs live. The URL and token are read from
# these env vars (populated from the gitignored .env) — never inline secrets in
# this tracked file.
[nats]
enabled = false
url_env = "NATS_URL"       # e.g. nats://entheai-nats.tail2870dc.ts.net:4222
token_env = "NATS_TOKEN"

# Distributed swarm (F2, opt-in, reuses [nats]). A worker node runs
# `entheai-worker --serve` to pull coder tasks off the JetStream work-queue,
# materialize the repo from a git bundle, run the coder in isolation, and bundle
# the result back; a dispatcher runs `entheai-worker --dispatch --task "…"`.
# NOTE: a worker executes model-generated code with full tools on that node —
# only run --serve on nodes you trust (tailnet-only; securefs hardening is F2.3).
[federation]
enabled = false
role = "auto"              # "auto" | "worker" | "dispatch"
deadline_secs = 600
sandbox = "permissive"     # coder confinement: "strict" | "permissive" | "off"
max_concurrent_coders = 4  # coders a --serve worker runs at once (they're model-wait-bound;
                           # all share one cached bare repo per base commit, so memory stays flat)
# role is reserved; worker mode is chosen by --serve / --dispatch.

# MCP servers — spawned at startup; their tools appear to the agent as `<name>__<tool>`.
# [mcp.codebase]
# command = "codebase-memory-mcp"
# args = ["--root", "."]

# Valyu deep-search MCP (remote). entheai's MCP client is stdio-only, so we bridge
# the remote endpoint through mcp_bridge.py. The API key is NOT stored here — this
# file is tracked in a public repo. The full URL (incl. ?valyuApiKey=…) lives in
# .env (gitignored) as VALYU_MCP_URL and is expanded by /bin/sh at spawn time.
[mcp.valyu]
command = "/bin/sh"
args = ["-c", "exec /usr/bin/python3 /Users/peter.lodri/.mcp-usage/bin/mcp_bridge.py --source entheai --server valyu --url $VALYU_MCP_URL"]

# Smart Tree — AI-friendly filesystem + code intelligence (30+ tools). Binary `st`
# from `cargo install smart-tree`; `--mcp` runs it as a stdio MCP server (on PATH).
[mcp.smart-tree]
command = "st"
args = ["--mcp"]

# rmcp-sensors — cross-platform environmental-awareness sensors exposed as MCP
# tools (`cargo install rmcp-sensors`); the bare binary is a stdio MCP server.
[mcp.rmcp-sensors]
command = "rmcp-sensors"
args = []

[agents.explore]
model = ["deepseek/deepseek-chat"] # local instead: ["osaurus/<your-local-model>"]

[agents.coder]
model = ["deepseek/deepseek-chat"]

[agents.reviewer]
model = ["deepseek/deepseek-reasoner"] # R1 — stronger reasoning for review

[agents.test]
model = ["deepseek/deepseek-chat"]

[agents.docs]
model = ["deepseek/deepseek-chat"]
