# Cloud (OpenCode Zen) is the default — set OPENCODE_API_KEY (https://opencode.ai/auth).
# The key value must be present in your local shell's env; a GitHub secret can't be read
# back for local use. See below for a secure macOS Keychain setup.
default_model = "zen/deepseek-v4-pro"

[providers.zen]
base_url = "https://opencode.ai/zen/v1"
api_key_env = "OPENCODE_API_KEY"

# Local (private) via Osaurus — switch default_model to an "osaurus/<id>" from
# `curl http://127.0.0.1:1337/v1/models`, or pass `--model osaurus/<id>`.
# See docs/osaurus-setup.md and docs/osaurus-opencode-provider.md.
[providers.osaurus]
base_url = "http://127.0.0.1:1337/v1"
